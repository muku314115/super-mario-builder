<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Mario - Platform Adventure</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🍄</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    #gameContainer {
      position: relative;
      width: 800px;
      height: 500px;
      border: 3px solid #c84c09;
      border-radius: 4px;
      overflow: hidden;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    #startScreen, #gameOverScreen, #winScreen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.85);
      z-index: 10;
      color: #fff;
      text-align: center;
    }
    #startScreen h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 28px;
      color: #e52521;
      text-shadow: 3px 3px 0 #7a1200;
      margin-bottom: 10px;
    }
    #startScreen h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      color: #fbd000;
      margin-bottom: 40px;
    }
    .menu-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      padding: 12px 32px;
      background: #e52521;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 8px;
      transition: transform 0.1s;
    }
    .menu-btn:hover { transform: scale(1.05); background: #ff3b30; }
    .controls-info {
      margin-top: 30px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #aaa;
      line-height: 2;
    }
    #gameOverScreen h1 { font-family: 'Press Start 2P', monospace; font-size: 24px; color: #e52521; margin-bottom: 20px; }
    #gameOverScreen p { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #fbd000; margin-bottom: 20px; }
    #winScreen h1 { font-family: 'Press Start 2P', monospace; font-size: 20px; color: #fbd000; margin-bottom: 20px; }
    #winScreen p { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #fff; margin-bottom: 20px; }
    .hidden { display: none !important; }
    #mobileControls {
      display: none;
      position: absolute;
      bottom: 10px;
      left: 0; right: 0;
      z-index: 5;
      padding: 0 15px;
      justify-content: space-between;
    }
    .touch-btn {
      width: 50px; height: 50px;
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      color: #fff;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    @media (max-width: 820px) {
      #gameContainer { width: 100vw; height: 62.5vw; max-height: 100vh; }
      #mobileControls { display: flex; }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <div id="startScreen">
      <h1>SUPER MARIO</h1>
      <h2>Platform Adventure</h2>
      <button class="menu-btn" onclick="startGame()">START GAME</button>
      <div class="controls-info">
        Arrow Keys / WASD to Move<br>
        Space / Up / W to Jump<br>
        Collect coins, stomp enemies, reach the flag!
      </div>
    </div>

    <div id="gameOverScreen" class="hidden">
      <h1>GAME OVER</h1>
      <p id="finalScore">Score: 0</p>
      <button class="menu-btn" onclick="startGame()">TRY AGAIN</button>
    </div>

    <div id="winScreen" class="hidden">
      <h1>🎉 LEVEL COMPLETE! 🎉</h1>
      <p id="winScore">Score: 0</p>
      <p id="winCoins">Coins: 0</p>
      <button class="menu-btn" onclick="startGame()">PLAY AGAIN</button>
    </div>

    <div id="mobileControls">
      <div style="display:flex;gap:8px;">
        <button class="touch-btn" id="btnLeft">◀</button>
        <button class="touch-btn" id="btnRight">▶</button>
      </div>
      <button class="touch-btn" id="btnJump">▲</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
